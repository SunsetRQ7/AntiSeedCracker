seed_obfuscation:
  intercept_login: true
  intercept_respawn: true

seed_rotation:
  enabled: true
  interval_seconds: 60

structure_protection:

  end_spikes:
    enabled: true
    worlds:
      - world_the_end
    modify_world: true

  end_cities:
    enabled: true
    worlds:
      - world_the_end
    modify_world: true

  spoof_locate_command:
    enabled: true
    max_offset: 2000

seed_integrity_monitor:
  enabled: true

slime_chunk_obfuscation:
  enabled: false
  worlds: []

structure_recon_monitor:
  enabled: true
  threshold: 6
  window_seconds: 900
  # Leave empty to use the built-in default list (shipwrecks, desert/jungle temples,
  # swamp huts, pillager outposts, ocean monuments, igloos, buried treasure, End
  # Cities, ancient cities — the structures SeedCrackerX-style tools accumulate bits
  # from). Deliberately excludes villages/mineshafts/ruined portals since those are
  # far too common to be a useful signal and would just generate noise.
  tracked_structures: []

eye_of_ender_protection:
  enabled: true
  worlds:
    - world
  fake_stronghold_min_distance: 800
  fake_stronghold_max_distance: 4000

update_checker:
  enabled: true
  modrinth_id: "YOUR_MODRINTH_PROJECT_ID"

database:
  enabled: true
  log_events: true
  max_event_age_days: 30

treasure_map_protection:
  enabled: true

messages:
  seed_blocked_player: "&c[AntiSeedCracker] Access to world seed information is restricted."
  seed_blocked_console: "&c[AntiSeedCracker] Seed access is restricted. The real seed is never exposed."

extra_blocked_commands:
  - "seedcracker"
  - "seedfind"
  - "worldseedinfo"

# Logs (never blocks — same non-punishing philosophy as structure_recon_monitor) when
# a player triggers several blocked /seed-family commands in a short window: a pattern
# consistent with a script or macro probing for a command-blocker bypass (trying many
# command variants back to back) rather than a player who just typed /seed once out of
# curiosity.
command_probing_monitor:
  enabled: true
  threshold: 5
  window_seconds: 30
